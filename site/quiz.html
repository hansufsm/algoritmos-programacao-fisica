<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QuizAlgo - FSC1189 Algoritmos & Programação</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', 'Geist', sans-serif;
    }
    h1, h2, h3, .heading {
      font-family: 'Plus Jakarta Sans', sans-serif;
    }
    .question-button {
      transition: all 0.2s ease;
    }
    .question-button:hover:not(:disabled) {
      transform: translateY(-2px);
    }
    .question-button:disabled {
      cursor: not-allowed;
    }
    .score-circle {
      width: 200px;
      height: 200px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      font-weight: bold;
    }
    .progress-bar {
      height: 4px;
      background: linear-gradient(to right, rgb(34, 197, 94), rgb(59, 130, 246), rgb(249, 115, 22), rgb(15, 23, 42));
      border-radius: 2px;
      transition: width 0.3s ease;
    }
    .fade-in {
      animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body class="bg-teal-700">
  <div class="min-h-screen flex flex-col">
    <!-- Nav -->
    <nav class="fixed top-6 left-0 right-0 z-50 flex justify-center px-6">
      <div class="bg-white rounded-full px-6 py-3 shadow-lg flex items-center justify-between gap-8 max-w-2xl">
        <a href="index.html" class="font-jakarta font-semibold text-slate-900 flex items-center gap-2 hover:text-cyan-600 transition">
          <span>← FSC1189</span>
        </a>
        <a href="index.html" class="text-sm font-medium text-slate-500 hover:text-slate-900 transition">Voltar</a>
      </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-1 flex items-center justify-center px-6 py-20 pt-32">
      <div class="w-full max-w-4xl bg-green-50 rounded-3xl p-8 sm:p-14 shadow-2xl">

        <!-- Screen 1: Level Selection -->
        <div id="levelScreen" class="fade-in">
          <!-- Hero SVG -->
          <div class="flex justify-center mb-8">
            <svg viewBox="0 0 400 300" width="400" height="300" class="max-w-full">
              <!-- INÍCIO (Oval) -->
              <ellipse cx="200" cy="40" rx="40" ry="25" fill="none" stroke="#06b6d4" stroke-width="2"/>
              <text x="200" y="45" text-anchor="middle" font-size="14" font-family="Inter" font-weight="600" fill="#0f172a">INÍCIO</text>

              <!-- Arrow down -->
              <line x1="200" y1="65" x2="200" y2="90" stroke="#06b6d4" stroke-width="2"/>
              <polygon points="200,90 195,80 205,80" fill="#06b6d4"/>

              <!-- Input box -->
              <rect x="130" y="90" width="140" height="60" fill="none" stroke="#06b6d4" stroke-width="2" rx="4"/>
              <text x="200" y="115" text-anchor="middle" font-size="12" font-family="Inter" fill="#0f172a" font-weight="500">leia(x)</text>
              <text x="200" y="135" text-anchor="middle" font-size="11" font-family="Courier New" fill="#06b6d4">se x > 0</text>
              <text x="200" y="148" text-anchor="middle" font-size="11" font-family="Courier New" fill="#06b6d4">entao</text>

              <!-- Arrow down -->
              <line x1="200" y1="150" x2="200" y2="175" stroke="#06b6d4" stroke-width="2"/>
              <polygon points="200,175 195,165 205,165" fill="#06b6d4"/>

              <!-- Decision Diamond -->
              <polygon points="200,175 260,225 200,275 140,225" fill="none" stroke="#14b8a6" stroke-width="2"/>
              <text x="200" y="228" text-anchor="middle" font-size="13" font-family="Inter" font-weight="600" fill="#0f172a">x > 0 ?</text>

              <!-- Left branch (SIM) -->
              <line x1="140" y1="225" x2="80" y2="225" stroke="#22c55e" stroke-width="2"/>
              <text x="110" y="218" font-size="11" fill="#22c55e" font-weight="600">SIM</text>
              <rect x="20" y="200" width="60" height="50" fill="none" stroke="#22c55e" stroke-width="2" rx="4"/>
              <text x="50" y="230" text-anchor="middle" font-size="12" font-family="Inter" font-weight="600" fill="#22c55e">Positivo</text>
              <line x1="50" y1="250" x2="50" y2="270" stroke="#22c55e" stroke-width="2"/>

              <!-- Right branch (NÃO) -->
              <line x1="260" y1="225" x2="320" y2="225" stroke="#ef4444" stroke-width="2"/>
              <text x="290" y="218" font-size="11" fill="#ef4444" font-weight="600">NÃO</text>
              <rect x="320" y="200" width="60" height="50" fill="none" stroke="#ef4444" stroke-width="2" rx="4"/>
              <text x="350" y="230" text-anchor="middle" font-size="12" font-family="Inter" font-weight="600" fill="#ef4444">Negativo</text>
              <line x1="350" y1="250" x2="350" y2="270" stroke="#ef4444" stroke-width="2"/>

              <!-- FIM (both merge) -->
              <line x1="50" y1="270" x2="175" y2="270" stroke="#06b6d4" stroke-width="2"/>
              <line x1="350" y1="270" x2="225" y2="270" stroke="#06b6d4" stroke-width="2"/>
              <ellipse cx="200" cy="285" rx="35" ry="20" fill="none" stroke="#06b6d4" stroke-width="2"/>
              <text x="200" y="290" text-anchor="middle" font-size="14" font-family="Inter" font-weight="600" fill="#0f172a">FIM</text>
            </svg>
          </div>

          <!-- Heading -->
          <h1 class="text-5xl lg:text-6xl font-jakarta font-semibold tracking-tight text-slate-900 text-center mb-4">
            QuizAlgo
          </h1>
          <p class="text-xl text-slate-600 text-center mb-12 max-w-2xl mx-auto">
            Teste seus conhecimentos sobre Algoritmos, Portugol, Lógica de Programação e Fluxogramas. Escolha um nível de dificuldade para começar!
          </p>

          <!-- Level Buttons -->
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-6 mb-8">
            <!-- Básico -->
            <button onclick="startQuiz('basico')" class="group flex flex-col items-center justify-center p-8 bg-gradient-to-br from-green-50 to-green-100 rounded-2xl border-2 border-green-300 hover:border-green-500 hover:shadow-lg transition shadow-sm">
              <div class="text-5xl mb-3">🟢</div>
              <h3 class="font-jakarta font-bold text-xl text-slate-900 mb-1">Básico</h3>
              <p class="text-sm text-slate-600 text-center">Conceitos fundamentais, fluxogramas, tipos de dados</p>
              <span class="text-xs text-green-600 font-medium mt-2">15 questões</span>
            </button>

            <!-- Intermediário -->
            <button onclick="startQuiz('intermediario')" class="group flex flex-col items-center justify-center p-8 bg-gradient-to-br from-blue-50 to-blue-100 rounded-2xl border-2 border-blue-300 hover:border-blue-500 hover:shadow-lg transition shadow-sm">
              <div class="text-5xl mb-3">🔵</div>
              <h3 class="font-jakarta font-bold text-xl text-slate-900 mb-1">Intermediário</h3>
              <p class="text-sm text-slate-600 text-center">Loops, vetores, funções, séries</p>
              <span class="text-xs text-blue-600 font-medium mt-2">15 questões</span>
            </button>

            <!-- Avançado -->
            <button onclick="startQuiz('avancado')" class="group flex flex-col items-center justify-center p-8 bg-gradient-to-br from-orange-50 to-orange-100 rounded-2xl border-2 border-orange-300 hover:border-orange-500 hover:shadow-lg transition shadow-sm">
              <div class="text-5xl mb-3">🟠</div>
              <h3 class="font-jakarta font-bold text-xl text-slate-900 mb-1">Avançado</h3>
              <p class="text-sm text-slate-600 text-center">Métodos numéricos, integração, EDO</p>
              <span class="text-xs text-orange-600 font-medium mt-2">15 questões</span>
            </button>

            <!-- Ninja -->
            <button onclick="startQuiz('ninja')" class="group flex flex-col items-center justify-center p-8 bg-gradient-to-br from-slate-900 to-slate-800 rounded-2xl border-2 border-cyan-500 hover:border-cyan-400 hover:shadow-lg hover:shadow-cyan-500/50 transition shadow-sm">
              <div class="text-5xl mb-3">⚫</div>
              <h3 class="font-jakarta font-bold text-xl text-white mb-1">Ninja</h3>
              <p class="text-sm text-slate-300 text-center">Complexidade, osciladores, dinâmica molecular</p>
              <span class="text-xs text-cyan-400 font-medium mt-2">15 questões</span>
            </button>
          </div>
        </div>

        <!-- Screen 2: Quiz Active -->
        <div id="quizScreen" class="hidden fade-in">
          <!-- Progress -->
          <div class="mb-8">
            <div class="flex items-center justify-between mb-3">
              <span class="font-jakarta font-semibold text-slate-900">Questão <span id="currentQuestion">1</span> de <span id="totalQuestions">10</span></span>
              <span id="difficultyBadge" class="px-3 py-1 rounded-full text-xs font-medium text-white"></span>
            </div>
            <div class="w-full bg-slate-200 rounded-full h-2 overflow-hidden">
              <div id="progressBar" class="progress-bar" style="width: 0%"></div>
            </div>
          </div>

          <!-- Question Card -->
          <div id="questionCard" class="mb-8 p-8 bg-white rounded-2xl shadow-sm border-l-4 border-cyan-500">
            <h2 id="questionText" class="text-2xl font-jakarta font-semibold text-slate-900 mb-8"></h2>

            <!-- Options -->
            <div id="optionsContainer" class="space-y-3 mb-6"></div>

            <!-- Feedback -->
            <div id="feedbackBox" class="hidden mt-6 p-4 rounded-lg">
              <p id="feedbackText" class="font-semibold mb-2"></p>
              <p id="explanationText" class="text-sm leading-relaxed"></p>
            </div>

            <!-- Next Button -->
            <button id="nextButton" onclick="nextQuestion()" class="hidden mt-6 w-full bg-cyan-500 hover:bg-cyan-600 text-white rounded-full py-3 font-semibold transition">
              Próxima Questão
            </button>
          </div>
        </div>

        <!-- Screen 3: Results -->
        <div id="resultScreen" class="hidden fade-in">
          <div class="text-center">
            <!-- Score Circle -->
            <div class="flex justify-center mb-8">
              <div id="scoreCircle" class="score-circle bg-gradient-to-br from-cyan-500 to-cyan-600 text-white shadow-lg">
                <span id="scorePercent">--</span>%
              </div>
            </div>

            <!-- Performance Message -->
            <h2 id="performanceTitle" class="text-4xl font-jakarta font-bold text-slate-900 mb-3"></h2>
            <p id="performanceText" class="text-lg text-slate-600 mb-8 max-w-2xl mx-auto"></p>

            <!-- Stats -->
            <div class="grid grid-cols-2 gap-6 mb-10 max-w-sm mx-auto">
              <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                <div class="text-3xl font-jakarta font-bold text-cyan-500 mb-1">
                  <span id="correctCount">0</span>/<span id="totalCount">10</span>
                </div>
                <p class="text-sm font-medium text-slate-600">Questões Corretas</p>
              </div>
              <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                <div class="text-2xl font-jakarta font-bold text-slate-900 mb-1">
                  <span id="difficultyResult">--</span>
                </div>
                <p class="text-sm font-medium text-slate-600">Dificuldade</p>
              </div>
            </div>

            <!-- Action Buttons -->
            <div class="flex flex-col sm:flex-row gap-4 justify-center">
              <button onclick="retakeQuiz()" class="px-8 py-3 bg-cyan-500 hover:bg-cyan-600 text-white rounded-full font-semibold transition">
                Tentar Novamente
              </button>
              <button onclick="changeDifficulty()" class="px-8 py-3 border-2 border-slate-300 hover:border-slate-400 text-slate-900 rounded-full font-semibold transition">
                Mudar Dificuldade
              </button>
              <button onclick="window.location.href='faq.html'" class="px-8 py-3 border-2 border-cyan-500 text-cyan-500 hover:bg-cyan-50 rounded-full font-semibold transition">
                Ver FAQ
              </button>
            </div>
          </div>
        </div>

      </div>
    </main>
  </div>

  <script src="data/questions.js"></script>
  <script>
    let currentQuestions = [];
    let currentLevel = '';
    let currentQuestionIndex = 0;
    let correctAnswers = 0;
    let answered = false;

    // Level configurations
    const levelConfig = {
      basico: { color: 'bg-green-500', badge: '🟢 Básico', count: 10 },
      intermediario: { color: 'bg-blue-500', badge: '🔵 Intermediário', count: 10 },
      avancado: { color: 'bg-orange-500', badge: '🟠 Avançado', count: 10 },
      ninja: { color: 'bg-slate-900 border-cyan-500', badge: '⚫ Ninja', count: 10 }
    };

    function startQuiz(level) {
      currentLevel = level;
      currentQuestions = getRandomQuestions(level, levelConfig[level].count);
      currentQuestionIndex = 0;
      correctAnswers = 0;
      answered = false;

      document.getElementById('levelScreen').classList.add('hidden');
      document.getElementById('quizScreen').classList.remove('hidden');
      document.getElementById('totalQuestions').textContent = currentQuestions.length;
      document.getElementById('difficultyBadge').textContent = levelConfig[level].badge;
      document.getElementById('difficultyBadge').className = `px-3 py-1 rounded-full text-xs font-medium text-white ${levelConfig[level].color}`;

      showQuestion();
    }

    function showQuestion() {
      if (currentQuestionIndex >= currentQuestions.length) {
        showResults();
        return;
      }

      answered = false;
      const q = currentQuestions[currentQuestionIndex];
      document.getElementById('currentQuestion').textContent = currentQuestionIndex + 1;

      // Update progress bar
      const progress = ((currentQuestionIndex) / currentQuestions.length) * 100;
      document.getElementById('progressBar').style.width = progress + '%';

      // Show question
      document.getElementById('questionText').textContent = q.question;

      // Hide feedback initially
      document.getElementById('feedbackBox').classList.add('hidden');
      document.getElementById('nextButton').classList.add('hidden');

      // Shuffle options
      const shuffledOptions = shuffleArray(q.options.map((opt, idx) => ({ text: opt, idx })));
      const optionsHTML = shuffledOptions.map((opt, i) => `
        <button onclick="checkAnswer(${opt.idx}, this)" class="question-button w-full p-4 text-left bg-white hover:bg-slate-50 border-2 border-slate-200 hover:border-cyan-500 rounded-xl font-medium text-slate-900 transition ${answered ? 'disabled' : ''}">
          <span class="inline-block w-6 h-6 rounded-full border-2 border-slate-300 text-center text-xs mr-3 align-middle">${String.fromCharCode(65 + i)}</span>
          ${opt.text}
        </button>
      `).join('');

      document.getElementById('optionsContainer').innerHTML = optionsHTML;
    }

    function checkAnswer(selectedIdx, buttonEl) {
      if (answered) return;
      answered = true;

      const q = currentQuestions[currentQuestionIndex];
      const isCorrect = selectedIdx === q.correct;

      if (isCorrect) {
        correctAnswers++;
        buttonEl.classList.add('bg-green-100', 'border-green-500');
        document.getElementById('feedbackText').textContent = '✓ Correto!';
        document.getElementById('feedbackBox').className = 'mt-6 p-4 rounded-lg bg-green-50 border border-green-300';
        document.getElementById('feedbackText').className = 'font-semibold mb-2 text-green-700';
      } else {
        buttonEl.classList.add('bg-red-100', 'border-red-500');
        // Highlight correct answer
        const correctBtn = Array.from(document.querySelectorAll('#optionsContainer button'))[q.correct];
        correctBtn.classList.add('bg-green-100', 'border-green-500');

        document.getElementById('feedbackText').textContent = '✗ Incorreto';
        document.getElementById('feedbackBox').className = 'mt-6 p-4 rounded-lg bg-red-50 border border-red-300';
        document.getElementById('feedbackText').className = 'font-semibold mb-2 text-red-700';
      }

      // Disable all buttons
      document.querySelectorAll('#optionsContainer button').forEach(btn => btn.disabled = true);

      // Show explanation and next button
      document.getElementById('explanationText').textContent = q.explanation;
      document.getElementById('feedbackBox').classList.remove('hidden');
      document.getElementById('nextButton').classList.remove('hidden');
    }

    function nextQuestion() {
      currentQuestionIndex++;
      showQuestion();
    }

    function showResults() {
      document.getElementById('quizScreen').classList.add('hidden');
      document.getElementById('resultScreen').classList.remove('hidden');

      const percentage = Math.round((correctAnswers / currentQuestions.length) * 100);
      document.getElementById('scorePercent').textContent = percentage;
      document.getElementById('correctCount').textContent = correctAnswers;
      document.getElementById('totalCount').textContent = currentQuestions.length;
      document.getElementById('difficultyResult').textContent = levelConfig[currentLevel].badge;

      let title, text, color;
      if (percentage >= 90) {
        title = '🎉 Excelente!';
        text = 'Você domina muito bem este assunto! Parabéns!';
        color = 'from-green-500 to-green-600';
      } else if (percentage >= 70) {
        title = '👏 Bom!';
        text = 'Você tem uma boa compreensão. Continue estudando!';
        color = 'from-blue-500 to-blue-600';
      } else if (percentage >= 50) {
        title = '📚 Regular';
        text = 'Estude mais sobre os conceitos e tente novamente.';
        color = 'from-orange-500 to-orange-600';
      } else {
        title = '💪 Continue Tentando';
        text = 'Revise a apostila e vença este desafio!';
        color = 'from-red-500 to-red-600';
      }

      document.getElementById('performanceTitle').textContent = title;
      document.getElementById('performanceText').textContent = text;
      document.getElementById('scoreCircle').className = `score-circle bg-gradient-to-br ${color} text-white shadow-lg`;
    }

    function retakeQuiz() {
      startQuiz(currentLevel);
      document.getElementById('resultScreen').classList.add('hidden');
      document.getElementById('quizScreen').classList.remove('hidden');
    }

    function changeDifficulty() {
      currentQuestionIndex = 0;
      correctAnswers = 0;
      document.getElementById('resultScreen').classList.add('hidden');
      document.getElementById('levelScreen').classList.remove('hidden');
    }

    // Initialize Lucide icons
    lucide.createIcons();
  </script>
</body>
</html>
